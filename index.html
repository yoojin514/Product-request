function getNthWeekday(y, m, dow, n) {
  const d = new Date(y, m, 1); let c = 0;
  while (true) { if (d.getDay() === dow && ++c === n) return new Date(d); d.setDate(d.getDate() + 1); }
}
function fmtDate(d) { return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`; }
function getMainPickup(dateStr) {
  const b = new Date(dateStr), y = b.getFullYear(), m = b.getMonth();
  const tue1 = getNthWeekday(y, m, 2, 1);
  const tm = b <= tue1 ? m : m + 1, ty = tm > 11 ? y + 1 : y;
  return getNthWeekday(ty, tm % 12, 5, 1);
}
function getSampleDeadline(dateStr) {
  const b = new Date(dateStr), y = b.getFullYear(), m = b.getMonth();
  if (b <= new Date(y, m, 8)) return `${y}년 ${m+1}월 10일 이후 담당자 안내`;
  const nm = m + 1, ny = nm > 11 ? y + 1 : y;
  return `${ny}년 ${nm % 12 + 1}월 10일 이후 담당자 안내`;
}
function getRestrictions(apps, name, dept) {
  const res = {};
  if (!name || !dept) return res;
  const ago = new Date(); ago.setMonth(ago.getMonth() - 3);
  (apps || []).forEach(a => {
    if (a.name !== name || a.dept !== dept || a.status === "반려") return;
    if (new Date(a.date) >= ago) {
      (a.mainProducts || []).forEach(p => {
        const prod = MAIN_PRODUCTS.find(x => x.name === p.name); if (!prod) return;
        const avail = new Date(a.date); avail.setMonth(avail.getMonth() + 3);
        if (!res[prod.id] || avail > new Date(res[prod.id])) res[prod.id] = avail.toISOString().split("T")[0];
      });
    }
  });
  return res;
}
function getSampleUsed(apps, name, dept) {
  if (!name || !dept) return 0;
  const now = new Date(); let used = 0;
  (apps || []).forEach(a => {
    if (a.name !== name || a.dept !== dept || a.status === "반려") return;
    const d = new Date(a.date);
    if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) used += a.totalSample || 0;
  });
  return used;
}

function EmployeeLogin({ onLogin, onAdminBypass, onGoAdmin }) {
  const [name,    setName]    = useState('');
  const [dept,    setDept]    = useState('');
  const [pin,     setPin]     = useState('');
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');

  const handleLogin = async () => {
    if(!name.trim()||!dept||!pin.trim()){ setError('모든 항목을 입력해주세요.'); return; }
    setLoading(true); setError('');
    try {
      const emp = await verifyEmployee(name.trim(), dept, pin.trim());
      if(!emp){ setError('이름, 부서, 또는 PIN이 일치하지 않습니다.'); setLoading(false); return; }
      const hire=new Date(emp.hire_date), avail=new Date(hire); avail.setMonth(avail.getMonth()+3);
      if(new Date()<avail){ setError(`입사 후 3개월 미만은 신청이 불가합니다. (${avail.getFullYear()}.${avail.getMonth()+1}.${avail.getDate()} 이후 가능)`); setLoading(false); return; }
      const ip = await getMyIP();
      const token = (typeof crypto!=='undefined'&&crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).slice(2));
      await createEmpSession(emp.id, emp.name, emp.dept, token, ip);
      await logAccess(emp.name, emp.dept, '로그인', ip);
      localStorage.setItem('emp_session', JSON.stringify({ token, empId:emp.id, empName:emp.name, empDept:emp.dept }));
      onLogin({ id:emp.id, name:emp.name, dept:emp.dept, token });
    } catch(e){ console.error(e); setError('로그인 중 오류가 발생했습니다.'); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F4F5F7',fontFamily:FF,padding:16 }}>
      <div style={{ background:'#fff',border:'1px solid #E5E7EB',borderRadius:16,padding:'36px 32px',width:'100%',maxWidth:400,boxShadow:'0 4px 24px rgba(0,0,0,0.08)' }}>
        <div style={{ textAlign:'center',marginBottom:28 }}>
          <img src="KOHONJIN Brand Identity_Horizontal Red.png" alt="고혼진리퍼블릭" style={{ height:52,maxWidth:220,objectFit:'contain',margin:'0 auto 14px',display:'block' }} />
          <div style={{ fontSize:13,color:'#6B7280' }}>제품 신청 시스템</div>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
          <div>
            <div style={{ fontSize:12,fontWeight:600,color:'#374151',marginBottom:5 }}>이름</div>
            <input style={INP} placeholder="홍길동" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
          </div>
          <div>
            <div style={{ fontSize:12,fontWeight:600,color:'#374151',marginBottom:5 }}>부서</div>
            <select style={{ ...INP,color:dept?'#111':'#9CA3AF' }} value={dept} onChange={e=>setDept(e.target.value)}>
              <option value="" disabled>부서 선택</option>
              {DEPT_LIST.map(d=><option key={d} value={d} style={{ color:'#111' }}>{d}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12,fontWeight:600,color:'#374151',marginBottom:5 }}>PIN</div>
            <input style={INP} type="password" inputMode="numeric" placeholder="숫자 PIN (최대 6자리)" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,6))} onKeyDown={e=>e.key==='Enter'&&handleLogin()} maxLength={6} />
          </div>
          {error && <div style={{ background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 12px',fontSize:13,color:'#DC2626' }}>{error}</div>}
          <button style={{ ...BP,marginTop:4 }} onClick={handleLogin} disabled={loading}>{loading?'확인 중...':'로그인'}</button>
        </div>
        <div style={{ marginTop:16,textAlign:'center',fontSize:12,color:'#9CA3AF' }}>PIN을 모르시면 관리자에게 문의해주세요</div>
        {onAdminBypass
          ? <button style={{ marginTop:10,width:'100%',padding:'10px',border:'1px solid #E5E7EB',borderRadius:8,background:'#F9FAFB',color:'#6B7280',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:FF }} onClick={onAdminBypass}>⚙️ 관리자 페이지로 이동</button>
          : <button style={{ marginTop:10,width:'100%',padding:'10px',border:'none',background:'transparent',color:'#9CA3AF',fontSize:12,cursor:'pointer',fontFamily:FF }} onClick={onGoAdmin}>관리자 로그인</button>
        }
      </div>
    </div>
  );
}

    if (!form.name.trim() || !form.dept) { setRestrictions({}); setSampleUsed(0); setMyApps([]); setMyAppsLoading(false); return; }
    setMyAppsLoading(true);
    debRef.current = setTimeout(async () => {
      const apps = await loadApplications();
      setRestrictions(getRestrictions(apps, form.name.trim(), form.dept));
      setSampleUsed(getSampleUsed(apps, form.name.trim(), form.dept));
      setMyApps(apps.filter(a => a.name === form.name.trim() && a.dept === form.dept));
      setMyAppsLoading(false);
    }, 400);
  }, [form.name, form.dept]);

  // 샘플 선택 시 카드결제 해제
  useEffect(() => {
    if (form.sampleItems.some(it => it.checked) && form.pay === "카드결제")
      setForm(f => ({ ...f, pay: "무통장입금" }));
  }, [form.sampleItems]);

  // 합계
  const mainBase  = form.mainItems.reduce((s, it) => { if (!it.checked) return s; const p = MAIN_PRODUCTS.find(x => x.id === it.id); return s + (p ? p.price : 0); }, 0);
  const mainVat   = form.pay === "카드결제" ? Math.round(mainBase * 0.1) : 0;
  const mainCount = form.mainItems.filter(it => it.checked).length;
  const sampleTotal = form.sampleItems.reduce((s, it) => { if (!it.checked) return s; const p = SAMPLE_PRODUCTS.find(x => x.id === it.id); return s + (p ? p.price * (Number(it.qty) || p.minQty) : 0); }, 0);
  const sampleCount = form.sampleItems.filter(it => it.checked).length;
  const sampleRemain = Math.max(0, SAMPLE_MONTHLY_LIMIT - sampleUsed - sampleTotal);

  const toggleMain = (id) => {
    if (restrictions[id]) return;
    setForm(f => ({ ...f, mainItems: f.mainItems.map(it => it.id === id ? { ...it, checked: !it.checked } : it) }));
  };
  const toggleSample = (id) => {
    const p = SAMPLE_PRODUCTS.find(x => x.id === id);
    const it = form.sampleItems.find(x => x.id === id);
    if (!it.checked) {
      const addAmt = p.price * (p.minQty || 1);
      if (sampleUsed + sampleTotal + addAmt > SAMPLE_MONTHLY_LIMIT) {
        const remain = SAMPLE_MONTHLY_LIMIT - sampleUsed - sampleTotal;
        setBlockMsg(remain <= 0 ? "이번 달 샘플 한도를 모두 사용했습니다."
          : `"${p.name}" 추가 시 이번 달 샘플 한도를 초과합니다.`);
        setTimeout(() => setBlockMsg(""), 4000);
        return;
      }
    }
    setBlockMsg("");
    setForm(f => ({ ...f, sampleItems: f.sampleItems.map(it => it.id === id ? { ...it, checked: !it.checked } : it) }));
  };
  const changeSampleQty = (id, val) => {
    const p = SAMPLE_PRODUCTS.find(x => x.id === id);
    const newQty = Number(val) || p.minQty;
    const others = form.sampleItems.reduce((s, it) => { if (!it.checked || it.id === id) return s; const pr = SAMPLE_PRODUCTS.find(x => x.id === it.id); return s + (pr ? pr.price * (Number(it.qty) || pr.minQty) : 0); }, 0);
    if (sampleUsed + others + p.price * newQty > SAMPLE_MONTHLY_LIMIT) {
      const remain = SAMPLE_MONTHLY_LIMIT - sampleUsed - others;
      const maxQty = Math.max(p.minQty, Math.floor(remain / p.price));
      const capped = p.minQty >= 100 ? (Math.floor(maxQty / 100) * 100 || p.minQty) : maxQty;
      setBlockMsg(`"${p.name}" 수량이 한도 초과로 ${capped}개로 조정됐습니다.`);
      setTimeout(() => setBlockMsg(""), 4000);
      setForm(f => ({ ...f, sampleItems: f.sampleItems.map(it => it.id === id ? { ...it, qty: capped } : it) }));
      return;
    }
    setForm(f => ({ ...f, sampleItems: f.sampleItems.map(it => it.id === id ? { ...it, qty: newQty } : it) }));
  };

  const handleSubmit = async () => {
    const e = {};
    if (!form.name.trim()) e.name = "이름을 입력해주세요";
    if (!form.dept)        e.dept = "부서를 선택해주세요";
    if (!form.pay)         e.pay  = "결제 방법을 선택해주세요";
    if (!form.mainItems.some(it => it.checked) && !form.sampleItems.some(it => it.checked))
      e.items = "본품 또는 샘플 중 하나 이상 선택해주세요";
    if (form.pay === "카드결제") {
      if (!form.cardCompany)                  e.cardCompany = "카드사를 선택해주세요";
      if (!form.cardNumber.replace(/\s/g,"")) e.cardNumber  = "카드번호를 입력해주세요";
      if (!form.cardExpiry)                   e.cardExpiry  = "유효기간을 입력해주세요";
    }
    if (sampleUsed + sampleTotal > SAMPLE_MONTHLY_LIMIT)
      e.sampleLimit = "샘플 선택 합계가 이번 달 잔여 한도를 초과합니다.";
    if (empError) { e.emp = empError; }
    setErrors(e);
    if (Object.keys(e).length > 0) return;

    const entry = {
      id: newId(), submittedAt: new Date().toLocaleString("ko-KR"),
      name: form.name.trim(), dept: form.dept, date: form.date, pay: form.pay,
      cardCompany: form.pay === "카드결제" ? form.cardCompany : "",
      cardNumber:  form.pay === "카드결제" ? form.cardNumber  : "",
      cardExpiry:  form.pay === "카드결제" ? form.cardExpiry  : "",
      mainProducts: form.mainItems.filter(it => it.checked).map(it => {
        const p = MAIN_PRODUCTS.find(x => x.id === it.id);
        return { name: p.name, price: p.price, qty: 1 };
      }),
      sampleProducts: form.sampleItems.filter(it => it.checked).map(it => {
        const p = SAMPLE_PRODUCTS.find(x => x.id === it.id);
        return { name: p.name, price: p.price, qty: Number(it.qty) || p.minQty, minQty: p.minQty };
      }),
      totalMain:   mainBase + mainVat,
      totalSample: sampleTotal,
      total:       mainBase + mainVat + sampleTotal,
      status: "접수",
    };
    setSubmitting(true);
    try {
      await addApplication(entry);
      setSubmitted(entry);
    } catch(err) {
      console.error(err);
      alert("신청 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
    } finally {
      setSubmitting(false);
    }
  };

  // 완료 화면
  if (submitted) {
    const hm = submitted.mainProducts.length > 0;
    const hs = submitted.sampleProducts.length > 0;
    return (
      <div style={{ fontFamily: FF, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F4F5F7", padding: 16 }}>
        <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 16, padding: "36px 24px", maxWidth: 460, width: "100%", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 14, boxShadow: "0 4px 20px rgba(0,0,0,0.07)" }}>
          <div style={{ fontSize: 44 }}>✅</div>
          <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>신청이 완료되었습니다</h2>
          <div style={{ width: "100%", background: "#EEF3FF", border: "1.5px solid #C7D7FB", borderRadius: 10, padding: "14px 16px" }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#1A56DB", marginBottom: 8 }}>📅 예상 수령일 안내</div>
            {hm && (() => {
              const b = new Date(submitted.date), y = b.getFullYear(), m = b.getMonth();
              const tue1 = getNthWeekday(y, m, 2, 1);
              const isNextMonth = b > tue1;
              const pickupDate = getMainPickup(submitted.date);
              return (
                <div style={{ marginBottom: 4 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                    <span>📦 본품 수령 예정일</span>
                    <span style={{ fontWeight: 700 }}>{fmtDate(pickupDate)}</span>
                  </div>
                  {isNextMonth && (
                    <div style={{ fontSize: 11, color: "#F59E0B", marginTop: 3 }}>
                      ⚠️ 첫째주 화요일 마감 이후 신청으로 <b>익월</b> 수령됩니다.
                    </div>
                  )}
                </div>
              );
            })()}
            {hs && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
              <span>🧪 샘플 수령 예정</span>
              <span style={{ fontWeight: 700, color: "#059669" }}>{getSampleDeadline(submitted.date)}</span>
            </div>}
          </div>
          <div style={{ width: "100%", background: "#F9FAFB", border: "1px solid #E5E7EB", borderRadius: 8, padding: "12px 16px", textAlign: "left" }}>
            {[
              ["신청번호", submitted.id],
              ["신청자",   `${submitted.name} / ${submitted.dept}`],
              ["신청일",   submitted.date],
              ...submitted.mainProducts.map(p  => [`[본품] ${p.name}`,  "1개"]),
              ...submitted.sampleProducts.map(p => [`[샘플] ${p.name}`, `${p.qty}${p.minQty >= 100 ? "장" : "개"}`]),
              ["결제", submitted.pay + (submitted.cardCompany ? ` (${submitted.cardCompany})` : "")],
              ["합계", fmt(submitted.total)],
            ].map(([l, v], i, arr) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px dashed #E5E7EB" }}>
                <span style={{ color: "#6B7280", fontSize: 13 }}>{l}</span>
                <span style={{ fontWeight: 600, fontSize: 13, fontFamily: "monospace", color: i === arr.length - 1 ? "#1A56DB" : "#111" }}>{v}</span>
              </div>
            ))}
          </div>
          <button style={BP} onClick={() => { setForm(makeForm()); setSubmitted(null); setErrors({}); setBlockMsg(""); }}>새 신청서 작성</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily: FF, maxWidth: 720, margin: "0 auto", padding: "24px 14px 60px", display: "flex", flexDirection: "column", gap: 14 }}>
      {empAuth && <Watermark name={empAuth.name} dept={empAuth.dept} />}

      {/* PIN 변경 모달 */}
      {pinModal && (
        <div style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center',padding:16 }}>
          <div style={{ background:'#fff',borderRadius:14,padding:'28px 24px',width:'100%',maxWidth:360,boxShadow:'0 8px 32px rgba(0,0,0,0.18)' }}>
            <div style={{ fontWeight:800,fontSize:17,marginBottom:4 }}>🔑 PIN 변경</div>
            <div style={{ fontSize:13,color:'#6B7280',marginBottom:20 }}>현재 PIN을 확인 후 새 PIN으로 변경합니다.</div>
            <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
              {[['cur','현재 PIN','현재 PIN 입력'],['next','새 PIN','숫자 4~6자리'],['confirm','새 PIN 확인','새 PIN 재입력']].map(([k,label,ph])=>(
                <div key={k}>
                  <div style={{ fontSize:12,fontWeight:600,color:'#374151',marginBottom:4 }}>{label}</div>
                  <input type="password" inputMode="numeric" style={INP} placeholder={ph} value={pinForm[k]}
                    onChange={e=>setPinForm(f=>({...f,[k]:e.target.value.replace(/\D/g,'').slice(0,6)}))}
                    onKeyDown={e=>e.key==='Enter'&&handlePinChange()} maxLength={6} />
                </div>
              ))}
              {pinMsg && <div style={{ background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:7,padding:'9px 12px',fontSize:13,color:'#DC2626' }}>{pinMsg}</div>}
            </div>
            <div style={{ display:'flex',gap:8,marginTop:20 }}>
              <button style={{ ...BP,flex:1 }} onClick={handlePinChange} disabled={pinSaving}>{pinSaving?'변경 중...':'변경 완료'}</button>
              <button style={{ ...BS,flex:1 }} onClick={()=>{ setPinModal(false); setPinForm({cur:'',next:'',confirm:''}); setPinMsg(''); }}>취소</button>
            </div>
          </div>
        </div>
      )}

      {/* 헤더 버튼 */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        {empAuth
          ? <div style={{ fontSize:13,fontWeight:600,color:'#374151' }}>👋 {empAuth.name} <span style={{ color:'#9CA3AF',fontWeight:400 }}>({empAuth.dept})</span></div>
          : <div />
        }
        <div style={{ display:"flex", gap:8 }}>
          {empAuth && <button style={{ ...BS,background:'#F0FDF4',color:'#059669',borderColor:'#BBF7D0' }} onClick={()=>setPinModal(true)}>🔑 PIN 변경</button>}
          {empAuth && <button style={{ ...BS,background:'#FEF2F2',color:'#DC2626',borderColor:'#FECACA' }} onClick={onEmpLogout}>로그아웃</button>}
          <button style={{ ...BS, padding: "8px 14px" }} onClick={onAdmin}>⚙️ 관리자 페이지</button>
        </div>
      </div>

      {/* 공지사항 */}
      <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ height: 6, background: "linear-gradient(90deg,#1A56DB,#6366F1)" }} />
        <div style={{ padding: "20px 18px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#1A56DB", marginBottom: 6 }}>📢 공지사항</div>
          <h1 style={{ fontSize: 20, fontWeight: 800, color: "#111", margin: "0 0 8px" }}>{notice.title || "제품 신청 안내"}</h1>
          <p style={{ fontSize: 14, color: "#6B7280", lineHeight: 1.7, margin: 0, whiteSpace: "pre-line" }}>{notice.body || ""}</p>
          {notice.deadline && <div style={{ marginTop: 10, display: "inline-block", background: "#EEF3FF", color: "#1A56DB", padding: "5px 12px", borderRadius: 20, fontSize: 13, fontWeight: 600 }}>📅 마감일: {notice.deadline}</div>}
        </div>
      </div>

      {/* 안내 규칙 */}
      <div style={CARD}>
        <div className="rule-row" style={{ display: "flex" }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>📦 본품 안내</div>
            {["제품별 3개월에 1개씩","카드결제 시 부가세 10% 추가","주문 마감: 매달 첫째주 화요일","결제: 첫째주 화요일 15:30","수령: 매달 첫째주 금요일"].map(t => <div key={t} style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.8 }}>• {t}</div>)}
          </div>
          <div className="rule-div" style={{ width: 1, background: "#E5E7EB", margin: "0 16px" }} />
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>🧪 샘플 안내</div>
            {["월 20만원 한도 / 달에 1번","무통장 입금으로만 구매","파우치는 100장 단위","주문 마감: 매달 10일 전 영업일","결제: 매달 10일 15:30"].map(t => <div key={t} style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.8 }}>• {t}</div>)}
          </div>
        </div>
      </div>

      {/* 신청자 정보 */}
      <div style={CARD}>
        <SLabel>신청자 정보</SLabel>
        <div className="info-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <SField label="이름" required error={errors.name}>
            <input style={{ ...BINP(errors.name), ...(empAuth?{background:'#F9FAFB',color:'#374151'}:{}) }} placeholder="홍길동" value={form.name}
              readOnly={!!empAuth} onChange={empAuth ? undefined : e => setForm(f => ({ ...f, name: e.target.value }))} />
          </SField>
          <SField label="부서" required error={errors.dept}>
            {empAuth
              ? <input style={{ ...INP, background:'#F9FAFB', color:'#374151' }} value={form.dept} readOnly />
              : <select style={{ ...BINP(errors.dept), color: form.dept ? "#111" : "#9CA3AF" }}
                  value={form.dept} onChange={e => setForm(f => ({ ...f, dept: e.target.value }))}>
                  <option value="" disabled>부서 선택</option>
                  {DEPT_LIST.map(d => <option key={d} value={d} style={{ color: "#111" }}>{d}</option>)}
                </select>
            }
          </SField>
          {empError && <div style={{ gridColumn:"span 2", background:"#FEF2F2", color:"#DC2626", fontSize:13, padding:"10px 14px", borderRadius:8, fontWeight:600 }}>🚫 {empError}</div>}
          <div style={{ gridColumn: "span 2" }}>
            <SField label="신청일자">
              <DatePickerInput style={INP} value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
            </SField>
          </div>
        </div>
      </div>

      {/* 내 신청 내역 */}
      {form.name.trim() && form.dept && (
        <div style={CARD}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <SLabel>📋 내 신청 내역</SLabel>
            <button style={BS} onClick={async () => {
              setMyAppsLoading(true);
              const all = await loadApplications();
              setMyApps(all.filter(a => a.name === form.name.trim() && a.dept === form.dept));
              setMyAppsLoading(false);
            }}>🔄 새로고침</button>
          </div>
          {myAppsLoading
            ? <div style={{ textAlign:"center", padding:20, color:"#9CA3AF" }}>조회 중...</div>
            : myApps.length === 0
              ? <div style={{ textAlign:"center", padding:20, color:"#9CA3AF" }}>신청 내역이 없습니다.</div>
              : <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {myApps.map(a => (
                    <div key={a.id} style={{ border:`1px solid ${a.status==="반려"?"#FECACA":"#E5E7EB"}`, borderRadius:8, padding:"12px 14px", background: a.status==="반려"?"#FFF5F5":"#fff" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                        <span style={{ fontFamily:"monospace", fontSize:12, color:"#6366F1" }}>{a.id}</span>
                        <span style={{ fontSize:12, fontWeight:700, padding:"2px 8px", borderRadius:20, background:(STATUS_COLOR[a.status]||"#aaa")+"22", color:STATUS_COLOR[a.status]||"#aaa" }}>{a.status}</span>
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:13 }}>
                        <span style={{ color:"#6B7280" }}>{a.date} · {a.pay}</span>
                        <span style={{ fontWeight:700, color:"#1A56DB" }}>{fmt(a.total||0)}</span>
                      </div>
                      {(a.mainProducts?.length > 0 || a.sampleProducts?.length > 0) && (
                        <div style={{ marginTop:6, fontSize:12, color:"#6B7280" }}>
                          {[...(a.mainProducts||[]).map(p=>`[본품] ${p.name}`), ...(a.sampleProducts||[]).map(p=>`[샘플] ${p.name} ${p.qty}개`)].join(" · ")}
                        </div>
                      )}
                      {a.status==="반려" && a.rejectReason && (
                        <div style={{ marginTop:8, background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:6, padding:"8px 12px", fontSize:12, color:"#DC2626" }}>
                          <span style={{ fontWeight:700 }}>반려 사유: </span>{a.rejectReason}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
          }
        </div>
      )}

      {/* 제품 선택 */}
      <div style={CARD}>
        <SLabel>{tab === "main" ? "제품 선택 (본품: 제품별 1개 고정)" : "제품 선택 및 수량"}</SLabel>
        {errors.items && <SErrMsg>{errors.items}</SErrMsg>}
        {errors.sampleLimit && tab === "sample" && <SErrMsg>{errors.sampleLimit}</SErrMsg>}
        {/* 탭 */}
        <div style={{ display: "flex", borderBottom: "1px solid #E5E7EB", marginBottom: 8 }}>
          {[["main","📦 본품"],["sample","🧪 샘플"]].map(([k, l]) => (
            <button key={k} onClick={() => setTab(k)} style={{ padding: "9px 16px", border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: tab === k ? 700 : 500, fontSize: 14, color: tab === k ? "#1A56DB" : "#6B7280", borderBottom: tab === k ? "2px solid #1A56DB" : "2px solid transparent", background: "transparent" }}>
              {l}
              {k === "main"   && mainCount   > 0 && <span style={{ background: "#1A56DB", color: "#fff", borderRadius: 20, fontSize: 11, fontWeight: 700, padding: "1px 7px", marginLeft: 4 }}>{mainCount}</span>}
              {k === "sample" && sampleCount > 0 && <span style={{ background: "#059669", color: "#fff", borderRadius: 20, fontSize: 11, fontWeight: 700, padding: "1px 7px", marginLeft: 4 }}>{sampleCount}</span>}
            </button>
          ))}
        </div>

        {/* 안내 배너 */}
        {tab === "sample" && blockMsg && <div style={{ margin: "4px 0 8px", padding: "10px 14px", background: "#FEF2F2", border: "1.5px solid #FECACA", borderRadius: 8, fontSize: 13, color: "#DC2626", fontWeight: 600 }}>🚫 {blockMsg}</div>}
        {tab === "main" && Object.keys(restrictions).length > 0 && <div style={{ margin: "4px 0 8px", padding: "8px 12px", background: "#FFF7ED", border: "1px solid #FED7AA", borderRadius: 6, fontSize: 12, color: "#92400E" }}>🔒 회색 제품은 3개월 이내 구매 이력으로 선택이 제한됩니다.</div>}
        {tab === "main" && form.pay === "카드결제" && mainCount > 0 && <div style={{ margin: "4px 0 8px", padding: "8px 12px", background: "#EEF3FF", border: "1px solid #C7D7FB", borderRadius: 6, fontSize: 12, color: "#1A56DB" }}>💳 카드결제 시 부가세 10% 추가됩니다.</div>}

function AdminLogin({ onLogin }) {
  const [id,   setId]   = useState(() => localStorage.getItem("admin_id") || "");
  const [pw,   setPw]   = useState("");
  const [err,  setErr]  = useState("");
  const [auto, setAuto] = useState(() => localStorage.getItem("admin_auto") === "true");

  useEffect(() => {
    if (localStorage.getItem("admin_auto") === "true") {
      const sid = localStorage.getItem("admin_id") || "";
      const spw = localStorage.getItem("admin_pw") || "";
      if (sid === ADMIN_ID && spw === ADMIN_PW) onLogin();
    }
  }, []);

  const handle = () => {
    if (id === ADMIN_ID && pw === ADMIN_PW) {
      if (auto) { localStorage.setItem("admin_auto","true"); localStorage.setItem("admin_id",id); localStorage.setItem("admin_pw",pw); }
      else { localStorage.removeItem("admin_auto"); localStorage.removeItem("admin_pw"); }
      onLogin();
    } else { setErr("아이디 또는 비밀번호가 올바르지 않습니다."); setPw(""); }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F4F5F7", fontFamily: FF, padding: 16 }}>
      <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 16, padding: "44px 32px", width: "100%", maxWidth: 380, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 50, height: 50, background: "#111827", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, margin: "0 auto 14px" }}>⚙️</div>
          <div style={{ fontWeight: 800, fontSize: 20 }}>관리자 로그인</div>
          <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 4 }}>제품 신청 관리 시스템</div>
        </div>
        <input style={INP} placeholder="아이디" value={id} onChange={e => setId(e.target.value)} onKeyDown={e => e.key==="Enter" && handle()} />
        <input type="password" style={INP} placeholder="비밀번호" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==="Enter" && handle()} />
        {err && <div style={{ fontSize: 13, color: "#DC2626", background: "#FEF2F2", padding: "8px 12px", borderRadius: 6 }}>{err}</div>}
        <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }} onClick={() => setAuto(v => !v)}>
          <div style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${auto ? "#1A56DB" : "#D1D5DB"}`, background: auto ? "#1A56DB" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            {auto && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
          </div>
          <span style={{ fontSize: 13 }}>자동 로그인</span>
        </label>
        <button style={{ ...BP, padding: "13px", width: "100%", fontSize: 15 }} onClick={handle}>로그인</button>
      </div>
    </div>
  );
}

      // DB 테이블 존재 여부 체크
      const [sr, lr] = await Promise.all([
        sb.from('sessions').select('id').limit(1),
        sb.from('access_logs').select('id').limit(1),
      ]);
      const ready = !sr.error && !lr.error;
      setDbReady(ready);
      if(!ready) setShowSetup(true);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);
  useEffect(() => { const fn = () => loadData(); window.addEventListener("focus", fn); return () => window.removeEventListener("focus", fn); }, [loadData]);

  const saveNotice   = async () => { try { await saveNoticeDB(notice); } catch(e) { console.error(e); } setEditNotice(false); };
  const updateStatus = async (id, status, reason) => { const cur = apps.find(a=>a.id===id); if(!cur)return; const changes={status,...(status==="반려"&&reason?{rejectReason:reason}:{})}; try { await updateApplication(id, changes, cur); } catch(e){ console.error(e); } const u = apps.map(a => a.id===id ? {...a,...changes} : a); setApps(u); if(selected?.id===id)setSelected(s=>({...s,...changes})); };
  const bulkStatus   = async (status) => { if(!checkedIds.size)return; let reason=""; if(status==="반려"){ reason=window.prompt("반려 사유를 입력해주세요:")||""; } const changes={status,...(status==="반려"&&reason?{rejectReason:reason}:{})}; const toUpd=apps.filter(a=>checkedIds.has(a.id)); try { await Promise.all(toUpd.map(a=>updateApplication(a.id,changes,a))); } catch(e){ console.error(e); } const u=apps.map(a=>checkedIds.has(a.id)?{...a,...changes}:a); setApps(u); setCheckedIds(new Set()); };
  const confirmPay   = async (id) => { const cur=apps.find(a=>a.id===id); if(!cur)return; try { await updateApplication(id,{status:"출고준비",payConfirmed:true},cur); } catch(e){ console.error(e); } const u=apps.map(a=>a.id===id?{...a,status:"출고준비",payConfirmed:true}:a); setApps(u); if(selected?.id===id)setSelected(s=>({...s,status:"출고준비",payConfirmed:true})); };
  const deleteApp    = async (id) => { if(!window.confirm("삭제할까요?"))return; try { await removeApplication(id); } catch(e){ console.error(e); } const u=apps.filter(a=>a.id!==id); setApps(u); if(selected?.id===id)setSelected(null); };
  const bulkDelete   = async () => { if(!checkedIds.size)return; if(!window.confirm(`선택한 ${checkedIds.size}건을 삭제할까요?`))return; const toDelete=apps.filter(a=>checkedIds.has(a.id)); try { await Promise.all(toDelete.map(a=>removeApplication(a.id))); } catch(e){ console.error(e); } const u=apps.filter(a=>!checkedIds.has(a.id)); setApps(u); if(selected&&checkedIds.has(selected.id))setSelected(null); setCheckedIds(new Set()); };

  const exportCSV = () => {
    const toExport = checkedIds.size > 0 ? apps.filter(a => checkedIds.has(a.id)) : displayed;
    const headers = ["신청번호","이름","부서","신청일자","접수시각","결제","상태","제품구분","제품명","단가","수량","소계","본품합계","샘플합계","최종합계"];
    const rows = [];
    toExport.forEach(a => {
      const all=[...(a.mainProducts||[]).map(p=>({...p,type:"본품"})),...(a.sampleProducts||[]).map(p=>({...p,type:"샘플"}))];
      if(!all.length){rows.push({신청번호:a.id,이름:a.name,부서:a.dept||"",신청일자:a.date,접수시각:a.submittedAt,결제:a.pay,상태:a.status,제품구분:"",제품명:"",단가:"",수량:"",소계:"",본품합계:a.totalMain||0,샘플합계:a.totalSample||0,최종합계:a.total||0});}
      else all.forEach((p,i)=>rows.push({신청번호:i===0?a.id:"",이름:i===0?a.name:"",부서:i===0?(a.dept||""):"",신청일자:i===0?a.date:"",접수시각:i===0?a.submittedAt:"",결제:i===0?a.pay:"",상태:i===0?a.status:"",제품구분:p.type,제품명:p.name,단가:p.price,수량:p.qty,소계:p.price*p.qty,본품합계:i===0?(a.totalMain||0):"",샘플합계:i===0?(a.totalSample||0):"",최종합계:i===0?(a.total||0):""}));
    });
    const csv=[headers.join(","),...rows.map(r=>headers.map(h=>{const v=r[h]??"";return String(v).includes(",") ? `"${v}"`:v;}).join(","))].join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download=`신청내역_${today()}.csv`;el.click();URL.revokeObjectURL(url);
  };

  // 통계
  const getStatApps = () => {
    const now = new Date();
    return apps.filter(a => {
      if (a.status === "반려") return false;
      const d = new Date(a.date);
      if (useCustom) { if(dateFrom&&d<new Date(dateFrom))return false; if(dateTo&&d>new Date(dateTo))return false; return true; }
      if (statRange === "daily")  return d.toDateString() === now.toDateString();
      if (statRange === "weekly") { const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s; }
      return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    });
  };
  const buildProd = (list) => { const m={}; list.forEach(a=>{[...(a.mainProducts||[]).map(p=>({...p,cat:"본품"})),...(a.sampleProducts||[]).map(p=>({...p,cat:"샘플"}))].forEach(p=>{const k=`[${p.cat}] ${p.name}`;if(!m[k])m[k]={name:k,qty:0,amount:0};m[k].qty+=Number(p.qty)||0;m[k].amount+=(p.price||0)*(Number(p.qty)||0);});}); return Object.values(m).sort((a,b)=>b.amount-a.amount); };
  const buildDept = (list) => { const m={}; list.forEach(a=>{const dept=a.dept||"미입력";if(!m[dept])m[dept]={dept,count:0,totalMain:0,totalSample:0,total:0,products:{}};m[dept].count++;m[dept].totalMain+=a.totalMain||0;m[dept].totalSample+=a.totalSample||0;m[dept].total+=a.total||0;[...(a.mainProducts||[]).map(p=>({...p,cat:"본품"})),...(a.sampleProducts||[]).map(p=>({...p,cat:"샘플"}))].forEach(p=>{const k=`[${p.cat}] ${p.name}`;if(!m[dept].products[k])m[dept].products[k]={qty:0,amount:0};m[dept].products[k].qty+=Number(p.qty)||0;m[dept].products[k].amount+=(p.price||0)*(Number(p.qty)||0);});}); return Object.values(m).sort((a,b)=>a.dept.localeCompare(b.dept,"ko")); };
  const buildPay  = (list) => { const m={}; list.forEach(a=>{const pay=a.pay||"미입력";if(!m[pay])m[pay]={pay,count:0,total:0};m[pay].count++;m[pay].total+=a.total||0;}); return Object.values(m).sort((a,b)=>b.total-a.total); };
  const buildPerson = () => { const m={}; apps.forEach(a=>{if(a.status==="반려")return;const k=a.name+"__"+(a.dept||"");if(!m[k])m[k]={name:a.name,dept:a.dept||"",count:0,totalMain:0,totalSample:0,total:0,products:{},lastDate:""};const p=m[k];p.count++;p.totalMain+=a.totalMain||0;p.totalSample+=a.totalSample||0;p.total+=a.total||0;if(!p.lastDate||a.date>p.lastDate)p.lastDate=a.date;[...(a.mainProducts||[]).map(x=>({...x,cat:"본품"})),...(a.sampleProducts||[]).map(x=>({...x,cat:"샘플"}))].forEach(x=>{const k2=`[${x.cat}] ${x.name}`;if(!p.products[k2])p.products[k2]={qty:0,amount:0};p.products[k2].qty+=Number(x.qty)||0;p.products[k2].amount+=(x.price||0)*(Number(x.qty)||0);});}); return Object.values(m).sort((a,b)=>a.name.localeCompare(b.name,"ko")); };

  const statApps = getStatApps();
  const prodStats = buildProd(statApps);
  const deptStats = buildDept(statApps);
  const payStats  = buildPay(statApps);
  const personStats = buildPerson().filter(p => p.name.includes(personSearch) || p.dept.includes(personSearch));
  const statTotal = statApps.reduce((s,a)=>s+(a.total||0),0);
  const rangeDesc = useCustom ? (dateFrom||dateTo ? `${dateFrom||"~"} ~ ${dateTo||"~"}` : "전체 기간") : {daily:"오늘",weekly:"이번 주",monthly:"이번 달"}[statRange];

  const stats = { total:apps.length, 접수:apps.filter(a=>a.status==="접수").length, 출고준비:apps.filter(a=>a.status==="출고준비").length, 반려:apps.filter(a=>a.status==="반려").length };
  let displayed = statusFilter==="전체" ? apps : apps.filter(a=>a.status===statusFilter);
  if(typeFilter==="본품") displayed=displayed.filter(a=>(a.mainProducts?.length||0)>0);
  if(typeFilter==="샘플") displayed=displayed.filter(a=>(a.sampleProducts?.length||0)>0);
  const grouped = (() => { const m={}; displayed.forEach(a=>{const k=a.date||"날짜없음";if(!m[k])m[k]=[];m[k].push(a);}); return Object.entries(m).sort(([a],[b])=>b.localeCompare(a)); })();

  return (
    <div style={{ fontFamily: FF, maxWidth: 1000, margin: "0 auto", padding: "20px 14px 60px", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* DB 설정 배너 */}
      {showSetup && <DbSetupBanner onDismiss={()=>setShowSetup(false)} />}
      {/* 헤더 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#fff", border:"1px solid #E5E7EB", borderRadius:12, padding:"16px 20px", boxShadow:"0 1px 4px rgba(0,0,0,0.06)", flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38,height:38,background:"#111827",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>⚙️</div>
          <div><div style={{ fontWeight:800,fontSize:18 }}>관리자 대시보드</div><div style={{ fontSize:12,color:"#6B7280" }}>제품 신청 관리 시스템</div></div>
        </div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
          <button style={{ ...BS,background:"#F0FDF4",color:"#059669",borderColor:"#BBF7D0" }} onClick={exportCSV}>
            📥 CSV {checkedIds.size > 0 ? `(선택 ${checkedIds.size}건)` : `(필터 ${displayed.length}건)`}
          </button>
          <button style={{ ...BS,background:"#FFF7ED",color:"#C2410C",borderColor:"#FED7AA" }} onClick={onGoShip}>🚚 출고 관리</button>
          <button style={BS} onClick={loadData}>🔄 새로고침</button>
          <button style={BO} onClick={onBack}>← 신청서</button>
          <button style={{ ...BS,background:"#FEF2F2",color:"#DC2626",borderColor:"#FECACA" }} onClick={onLogout}>로그아웃</button>
        </div>
      </div>

      {/* 통계 카드 */}
      <div className="stat-grid" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
        {[["전체",stats.total,"#1A56DB"],["접수",stats.접수,"#6366F1"],["출고준비",stats.출고준비,"#0891B2"],["반려",stats.반려,"#DC2626"]].map(([l,v,c]) => (
          <div key={l} onClick={() => { setTab("list"); setStatusFilter(l); }}
            style={{ background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,padding:"16px 18px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderTop:`3px solid ${c}`,cursor:"pointer",...(statusFilter===l&&tab==="list"?{boxShadow:`0 0 0 2px ${c}`}:{}) }}>
            <div style={{ fontSize:22,fontWeight:800,color:c,fontFamily:"monospace" }}>{v}</div>
            <div style={{ fontSize:12,color:"#6B7280" }}>{l}</div>
            <div style={{ fontSize:10,color:"#C4C9D4",marginTop:2 }}>클릭하여 필터</div>
          </div>
        ))}
      </div>

      {/* 공지사항 */}
      <div style={{ background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,padding:"18px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
          <div style={{ fontWeight:700,fontSize:14 }}>📢 공지사항 관리</div>
          {!editNotice
            ? <button style={BS} onClick={()=>setEditNotice(true)}>편집</button>
            : <div style={{ display:"flex",gap:8 }}><button style={{ ...BS,background:"#EEF3FF",color:"#1A56DB" }} onClick={saveNotice}>저장</button><button style={BS} onClick={()=>setEditNotice(false)}>취소</button></div>}
        </div>
        {editNotice ? (
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            <input style={INP} placeholder="공지 제목" value={notice.title} onChange={e=>setNotice(n=>({...n,title:e.target.value}))} />
            <textarea style={{ ...INP,minHeight:80,resize:"vertical" }} value={notice.body} onChange={e=>setNotice(n=>({...n,body:e.target.value}))} />
            <input type="date" style={INP} value={notice.deadline} onChange={e=>setNotice(n=>({...n,deadline:e.target.value}))} />
          </div>
        ) : (
          <div>
            <div style={{ fontWeight:700,fontSize:15,marginBottom:4 }}>{notice.title||"(제목 없음)"}</div>
            <div style={{ fontSize:13,color:"#6B7280",lineHeight:1.6 }}>{notice.body||"(내용 없음)"}</div>
            {notice.deadline&&<div style={{ fontSize:12,marginTop:8,color:"#1A56DB",fontWeight:600 }}>📅 마감일: {notice.deadline}</div>}
          </div>
        )}
      </div>

      {/* 탭 */}
      <div style={{ background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,padding:"18px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ display:"flex",borderBottom:"1px solid #E5E7EB",marginBottom:16,overflowX:"auto" }}>
          {[["list","📋 신청 목록"],["stats","📊 통계"],["person","👤 신청자별 통계"],["employees","👥 직원 관리"],["logs","🔍 접속 로그"]].map(([k,l]) => (
            <button key={k} onClick={()=>setTab(k)} style={{ padding:"10px 16px",border:"none",background:"transparent",fontFamily:"inherit",fontWeight:tab===k?700:500,fontSize:14,color:tab===k?"#1A56DB":"#6B7280",borderBottom:tab===k?"2px solid #1A56DB":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap" }}>{l}</button>
          ))}
        </div>

        {/* 신청 목록 */}
        {tab==="list" && (
          <>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8 }}>
              <div style={{ fontSize:14,fontWeight:700 }}>일별 신청 내역</div>
              <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                {["전체","본품","샘플"].map(t=><button key={t} style={{ ...FB,...(typeFilter===t?{background:"#111827",color:"#fff",borderColor:"#111827"}:{}) }} onClick={()=>setTypeFilter(t)}>{t}</button>)}
                <div style={{ width:1,height:18,background:"#E5E7EB" }} />
                {["전체","접수","출고준비","반려"].map(s=><button key={s} style={{ ...FB,...(statusFilter===s?FBA:{}) }} onClick={()=>setStatusFilter(s)}>{s}</button>)}
              </div>
            </div>
            {checkedIds.size>0&&(
              <div style={{ display:"flex",alignItems:"center",gap:10,background:"#111827",borderRadius:8,padding:"10px 16px",marginBottom:12,flexWrap:"wrap" }}>
                <span style={{ fontSize:13,color:"#fff",fontWeight:600 }}>{checkedIds.size}건 선택</span>
                <div style={{ flex:1 }} />
                {["출고준비","반려"].map(st=><button key={st} style={{ padding:"6px 14px",border:"none",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:st==="출고준비"?"#0891B2":"#DC2626",color:"#fff" }} onClick={()=>bulkStatus(st)}>{st}</button>)}
                <button style={{ padding:"6px 14px",border:"none",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:"#7F1D1D",color:"#FCA5A5" }} onClick={bulkDelete}>🗑 선택 삭제</button>
                <button style={{ padding:"6px 12px",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,fontSize:12,background:"transparent",color:"#9CA3AF",cursor:"pointer",fontFamily:"inherit" }} onClick={()=>setCheckedIds(new Set())}>취소</button>
              </div>

            {loading ? <div style={{ textAlign:"center",padding:40,color:"#9CA3AF" }}>불러오는 중...</div>
              : grouped.length===0 ? <div style={{ textAlign:"center",padding:40,color:"#9CA3AF" }}>신청 내역이 없습니다.</div>
              : grouped.map(([date,dayApps]) => (
                <div key={date} style={{ marginBottom:20 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer",userSelect:"none" }} onClick={()=>{const n=new Set(collapsedDates);n.has(date)?n.delete(date):n.add(date);setCollapsedDates(n);}}>
                    <div style={{ fontWeight:700,fontSize:13 }}>📅 {date}</div>
                    <div style={{ flex:1,height:1,background:"#E5E7EB" }} />
                    <div style={{ fontSize:12,color:"#6B7280" }}>{dayApps.length}건 · {fmt(dayApps.reduce((s,a)=>s+(a.total||0),0))}</div>
                    <span style={{ fontSize:11,color:"#9CA3AF",transform:collapsedDates.has(date)?"rotate(-90deg)":"rotate(0deg)",display:"inline-block",transition:"transform .2s" }}>▼</span>
                  </div>
                  {!collapsedDates.has(date) && <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
                      <thead>
                        <tr style={{ background:"#F9FAFB" }}>
                          <th style={{ ...TH,width:36 }}>
                            <input type="checkbox" style={{ accentColor:"#1A56DB" }}
                              checked={dayApps.length>0&&dayApps.every(a=>checkedIds.has(a.id))}
                              onChange={e=>{const n=new Set(checkedIds);dayApps.forEach(a=>e.target.checked?n.add(a.id):n.delete(a.id));setCheckedIds(n);}} />
                          </th>
                          {["신청번호","이름","부서","본품","샘플","합계","결제","상태"].map(h=><th key={h} style={TH}>{h}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {dayApps.map(a => (
                          <React.Fragment key={a.id}>
                            <tr style={{ cursor:"pointer",background:checkedIds.has(a.id)?"#F0F4FF":selected?.id===a.id?"#EEF3FF":"#fff" }}
                              onClick={()=>setSelected(p=>p?.id===a.id?null:a)}>
                              <td style={TD} onClick={e=>e.stopPropagation()}><input type="checkbox" style={{ accentColor:"#1A56DB" }} checked={checkedIds.has(a.id)} onChange={e=>{const n=new Set(checkedIds);e.target.checked?n.add(a.id):n.delete(a.id);setCheckedIds(n);}}/></td>
                              <td style={{ ...TD,fontFamily:"monospace",fontSize:12,color:"#6366F1" }}>{a.id}</td>
                              <td style={{ ...TD,fontWeight:600 }}>{a.name}</td>
                              <td style={{ ...TD,color:"#6B7280" }}>{a.dept||"—"}</td>
                              <td style={{ ...TD,textAlign:"center" }}>{(a.mainProducts?.length||0)>0?<span style={{ display:"inline-block",padding:"3px 8px",borderRadius:20,fontSize:12,fontWeight:700,background:"#EEF3FF",color:"#1A56DB" }}>{a.mainProducts.length}종</span>:<span style={{ color:"#D1D5DB" }}>—</span>}</td>
                              <td style={{ ...TD,textAlign:"center" }}>{(a.sampleProducts?.length||0)>0?<span style={{ display:"inline-block",padding:"3px 8px",borderRadius:20,fontSize:12,fontWeight:700,background:"#F0FDF4",color:"#059669" }}>{a.sampleProducts.length}종</span>:<span style={{ color:"#D1D5DB" }}>—</span>}</td>
                              <td style={{ ...TD,fontFamily:"monospace",fontWeight:700,color:"#1A56DB" }}>{fmt(a.total||0)}</td>
                              <td style={TD}>{a.pay}</td>
                              <td style={TD}><span style={{ display:"inline-block",padding:"3px 8px",borderRadius:20,fontSize:12,fontWeight:700,background:(STATUS_COLOR[a.status]||"#aaa")+"22",color:STATUS_COLOR[a.status]||"#aaa" }}>{a.status}</span></td>

                              <tr><td colSpan={9} style={{ padding:0 }}>

                              </td></tr>

                          </React.Fragment>
                        ))}
                      </tbody>
                    </table>
                  </div>}
                </div>
              ))}
          </>
        )}

        {/* 통계 */}
        {tab==="stats" && (
          <>
            <div style={{ background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:"14px 16px",marginBottom:14 }}>
              <div style={{ fontSize:12,fontWeight:700,marginBottom:10 }}>📅 조회 기간</div>
              <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:8 }}>
                {[["daily","오늘"],["weekly","이번 주"],["monthly","이번 달"]].map(([k,l])=><button key={k} style={{ ...FB,...(!useCustom&&statRange===k?FBA:{}) }} onClick={()=>{setStatRange(k);setUseCustom(false);}}>{l}</button>)}
                <button style={{ ...FB,...(useCustom?FBA:{}) }} onClick={()=>setUseCustom(true)}>📆 직접 선택</button>

              {useCustom&&(
                <div style={{ display:"flex",gap:10,alignItems:"center",flexWrap:"wrap" }}>
                  <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                    <span style={{ fontSize:12,color:"#6B7280" }}>시작</span>
                    <DatePickerInput style={{ ...INP,width:"auto",fontSize:13,padding:"7px 10px" }} value={dateFrom} onChange={e=>{if(dateTo&&(new Date(dateTo)-new Date(e.target.value))/86400000>365){alert("최대 1년까지 선택 가능합니다.");return;}setDateFrom(e.target.value);}} />
                  </div>
                  <span style={{ color:"#9CA3AF" }}>~</span>
                  <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                    <span style={{ fontSize:12,color:"#6B7280" }}>종료</span>
                    <DatePickerInput style={{ ...INP,width:"auto",fontSize:13,padding:"7px 10px" }} value={dateTo} onChange={e=>{if(dateFrom&&(new Date(e.target.value)-new Date(dateFrom))/86400000>365){alert("최대 1년까지 선택 가능합니다.");return;}setDateTo(e.target.value);}} />
                  </div>
                  <button style={{ ...BT,color:"#DC2626",borderColor:"#FECACA" }} onClick={()=>{setDateFrom("");setDateTo("");}}>초기화</button>
                </div>
              )}
            </div>
            <div style={{ background:"#F0F4FF",border:"1px solid #C7D7FB",borderRadius:8,padding:"14px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8 }}>
              <div><div style={{ fontSize:12,color:"#6B7280" }}>{rangeDesc} 총 신청 금액</div><div style={{ fontFamily:"monospace",fontWeight:800,fontSize:22,color:"#1A56DB" }}>{fmt(statTotal)}</div></div>
              <div style={{ textAlign:"right" }}><div style={{ fontSize:12,color:"#6B7280" }}>{rangeDesc} 신청 건수</div><div style={{ fontFamily:"monospace",fontWeight:800,fontSize:22 }}>{statApps.length}건</div></div>
            </div>
            <div style={{ display:"flex",gap:6,marginBottom:14,flexWrap:"wrap" }}>
              {[["prod","📦 제품별"],["dept","🏢 부서별"],["pay","💳 결제수단별"]].map(([k,l])=><button key={k} style={{ ...FB,...(statSubTab===k?FBA:{}) }} onClick={()=>setStatSubTab(k)}>{l}</button>)}
            </div>
            {statSubTab==="prod"&&(prodStats.length===0?<SAEmpty>{rangeDesc} 데이터 없음</SAEmpty>:<table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}><thead><tr style={{ background:"#F9FAFB" }}>{["제품명","총 수량","총 금액"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead><tbody>{prodStats.map((p,i)=><tr key={i}><td style={{ ...TD,fontWeight:600 }}>{p.name}</td><td style={{ ...TD,fontFamily:"monospace" }}>{p.qty.toLocaleString()}</td><td style={{ ...TD,fontFamily:"monospace",fontWeight:700,color:"#1A56DB" }}>{fmt(p.amount)}</td></tr>)}</tbody></table>)}
            {statSubTab==="dept"&&(deptStats.length===0?<SAEmpty>{rangeDesc} 데이터 없음</SAEmpty>:<div style={{ display:"flex",flexDirection:"column",gap:8 }}>{deptStats.map((d,i)=><DeptCard key={i} dept={d}/>)}</div>)}
            {statSubTab==="pay"&&(payStats.length===0?<SAEmpty>{rangeDesc} 데이터 없음</SAEmpty>:<><div style={{ display:"flex",gap:10,marginBottom:14,flexWrap:"wrap" }}>{payStats.map((p,i)=>{const isCard=p.pay==="카드결제",color=isCard?"#6366F1":"#1A56DB",bg=isCard?"#F5F3FF":"#EEF3FF",border=isCard?"#DDD6FE":"#C7D7FB",pct=statApps.length>0?Math.round(p.count/statApps.length*100):0;return(<div key={i} style={{ flex:1,minWidth:140,background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"14px 16px" }}><div style={{ fontSize:20,marginBottom:6 }}>{isCard?"💳":"🏦"}</div><div style={{ fontWeight:800,fontSize:14,marginBottom:2 }}>{p.pay}</div><div style={{ fontFamily:"monospace",fontWeight:800,fontSize:20,color }}>{fmt(p.total)}</div><div style={{ fontSize:12,color:"#6B7280",marginTop:4 }}>{p.count}건 · {pct}%</div><div style={{ height:4,background:"#E5E7EB",borderRadius:4,marginTop:8 }}><div style={{ height:"100%",width:`${pct}%`,background:color,borderRadius:4 }}/></div></div>);})}</div><table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}><thead><tr style={{ background:"#F9FAFB" }}>{["결제 수단","건수","비율","총 금액"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead><tbody>{payStats.map((p,i)=>{const pct=statApps.length>0?Math.round(p.count/statApps.length*100):0;return(<tr key={i}><td style={{ ...TD,fontWeight:700 }}>{p.pay==="카드결제"?"💳 ":"🏦 "}{p.pay}</td><td style={{ ...TD,fontFamily:"monospace" }}>{p.count}건</td><td style={{ ...TD,fontFamily:"monospace",color:"#6B7280" }}>{pct}%</td><td style={{ ...TD,fontFamily:"monospace",fontWeight:700,color:"#1A56DB" }}>{fmt(p.total)}</td></tr>);})}</tbody></table></>)}
          </>
        )}

        {/* 신청자별 통계 */}
        {tab==="person"&&(
          <>
            <div style={{ position:"relative",marginBottom:16 }}>
              <span style={{ position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#9CA3AF",pointerEvents:"none" }}>🔍</span>
              <input style={{ ...INP,paddingLeft:36 }} placeholder="이름 또는 부서로 검색..." value={personSearch} onChange={e=>setPersonSearch(e.target.value)} />
              {personSearch&&<button onClick={()=>setPersonSearch("")} style={{ position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:16,color:"#9CA3AF",cursor:"pointer" }}>✕</button>}
            </div>
            <div style={{ display:"flex",gap:10,marginBottom:16 }}>
              <div style={{ background:"#F0F4FF",border:"1px solid #C7D7FB",borderRadius:8,padding:"10px 16px",flex:1 }}><div style={{ fontSize:11,color:"#6B7280" }}>총 신청자</div><div style={{ fontFamily:"monospace",fontWeight:800,fontSize:20,color:"#1A56DB" }}>{personStats.length}명</div></div>
              <div style={{ background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 16px",flex:1 }}><div style={{ fontSize:11,color:"#6B7280" }}>총 신청 금액</div><div style={{ fontFamily:"monospace",fontWeight:800,fontSize:20,color:"#059669" }}>{fmt(personStats.reduce((s,p)=>s+p.total,0))}</div></div>
            </div>
            {personStats.length===0?<SAEmpty>{personSearch?`"${personSearch}" 검색 결과 없음`:"신청 내역이 없습니다."}</SAEmpty>
              :<div style={{ display:"flex",flexDirection:"column",gap:10 }}>{personStats.map((p,i)=><PersonCard key={i} person={p}/>)}</div>}
          </>
        )}

        {/* 직원 관리 */}
        {tab==="employees" && (
          <EmployeeManager employees={employees} onReload={() => loadEmployees().then(setEmployees)} />
        )}

        {/* 접속 로그 */}
        {tab==="logs" && <AccessLogViewer />}
      </div>
    </div>
  );
}

      <div style={{ display:"flex",justifyContent:"flex-end",gap:10,borderTop:"2px solid #E5E7EB",paddingTop:10,marginBottom:14 }}>

/* ════════════════════════════════════════════════════════
   출고 관리 페이지
════════════════════════════════════════════════════════ */
function ShipPage({ onBack }) {
  const [apps,         setApps]         = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [mainTab,      setMainTab]      = useState("overview");
  const [viewMode,     setViewMode]     = useState("date");
  const [statusFilter, setStatusFilter] = useState("전체");
  const [filterDate,   setFilterDate]   = useState("");
  const [filterName,   setFilterName]   = useState("");
  const [selectedKey,  setSelectedKey]  = useState(null);
  const [checkedShipIds, setCheckedShipIds] = useState(new Set());

  const loadData = useCallback(async () => {
    setLoading(true);
    try { setApps(await loadApplications()); }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);
  useEffect(() => { const fn=()=>loadData(); window.addEventListener("focus",fn); return()=>window.removeEventListener("focus",fn); }, [loadData]);

  const updateShip = async (id, shipStatus) => { const cur=apps.find(a=>a.id===id); if(!cur)return; try { await updateApplication(id,{shipStatus},cur); } catch(e){ console.error(e); } setApps(apps.map(a=>a.id===id?{...a,shipStatus}:a)); };
  const bulkShip   = async (ids, shipStatus) => { const toUpd=apps.filter(a=>ids.includes(a.id)); try { await Promise.all(toUpd.map(a=>updateApplication(a.id,{shipStatus},a))); } catch(e){ console.error(e); } setApps(apps.map(a=>ids.includes(a.id)?{...a,shipStatus}:a)); };

  const exportCSV = () => {
    const filteredList = groups.flatMap(([k,list])=>list);
    const toExport = checkedShipIds.size > 0 ? filteredList.filter(a=>checkedShipIds.has(a.id)) : filteredList;
    const headers=["신청번호","이름","부서","신청일자","결제","출고상태","제품구분","제품명","수량"];
    const rows=[];
    toExport.forEach(a=>{
      const all=[...(a.mainProducts||[]).map(p=>({...p,type:"본품"})),...(a.sampleProducts||[]).map(p=>({...p,type:"샘플"}))];
      if(!all.length){rows.push({신청번호:a.id,이름:a.name,부서:a.dept||"",신청일자:a.date,결제:a.pay,출고상태:a.shipStatus||"출고예정",제품구분:"",제품명:"",수량:""});}
      else all.forEach((p,i)=>rows.push({신청번호:i===0?a.id:"",이름:i===0?a.name:"",부서:i===0?(a.dept||""):"",신청일자:i===0?a.date:"",결제:i===0?a.pay:"",출고상태:i===0?(a.shipStatus||"출고예정"):"",제품구분:p.type,제품명:p.name,수량:p.qty}));
    });
    const csv=[headers.join(","),...rows.map(r=>headers.map(h=>{const v=r[h]??"";return String(v).includes(",")?`"${v}"`:v;}).join(","))].join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download=`출고관리_${today()}.csv`;el.click();URL.revokeObjectURL(url);
  };

  const sumProds = (list, tf) => {
    const m={};
    list.forEach(a=>{
      const prods=tf==="본품"?(a.mainProducts||[]).map(p=>({...p,type:"본품"})):tf==="샘플"?(a.sampleProducts||[]).map(p=>({...p,type:"샘플"})):[...(a.mainProducts||[]).map(p=>({...p,type:"본품"})),...(a.sampleProducts||[]).map(p=>({...p,type:"샘플"}))];
      prods.forEach(p=>{const k=`[${p.type}] ${p.name}`;if(!m[k])m[k]={name:p.name,type:p.type,qty:0};m[k].qty+=Number(p.qty)||0;});
    });
    return Object.values(m).sort((a,b)=>a.type.localeCompare(b.type)||a.name.localeCompare(b.name,"ko"));
  };

  const shipApps = apps.filter(a => a.status === "출고준비");
  const totalDone    = shipApps.filter(a=>a.shipStatus==="출고완료").length;
  const totalPending = shipApps.length - totalDone;

  const buildGroups = () => {
    let f=[...shipApps];
    if(filterDate) f=f.filter(a=>a.date===filterDate);
    if(filterName.trim()) f=f.filter(a=>a.name.includes(filterName.trim())||(a.dept||"").includes(filterName.trim()));
    if(statusFilter==="출고예정") f=f.filter(a=>(a.shipStatus||"출고예정")==="출고예정");
    if(statusFilter==="출고완료") f=f.filter(a=>a.shipStatus==="출고완료");
    const m={};
    f.forEach(a=>{const k=viewMode==="date"?(a.date||"날짜없음"):viewMode==="dept"?(a.dept||"미입력"):`${a.name} / ${a.dept||""}`;if(!m[k])m[k]=[];m[k].push(a);});
    return Object.entries(m).sort(([a],[b])=>viewMode==="date"?b.localeCompare(a):a.localeCompare(b,"ko"));
  };

  const buildPickup = () => {
    const mm={},sm={};
    shipApps.forEach(a=>{
      if((a.mainProducts||[]).length){const d=getMainPickup(a.date),k=d.toISOString().split("T")[0];if(!mm[k])mm[k]={pickupDate:k,pickupLabel:fmtDate(d),apps:[]};mm[k].apps.push(a);}
      if((a.sampleProducts||[]).length){const k=getSampleDeadline(a.date);if(!sm[k])sm[k]={label:k,apps:[]};sm[k].apps.push(a);}
    });
    return {main:Object.values(mm).sort((a,b)=>a.pickupDate.localeCompare(b.pickupDate)),sample:Object.values(sm)};
  };

  const groups  = buildGroups();
  const pickup  = buildPickup();

  return (
    <div style={{ fontFamily:FF,maxWidth:1000,margin:"0 auto",padding:"20px 14px 60px",display:"flex",flexDirection:"column",gap:14 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff",border:"1px solid #E5E7EB",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flexWrap:"wrap",gap:10 }}>
        <div style={{ display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ width:38,height:38,background:"#C2410C",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>🚚</div>
          <div><div style={{ fontWeight:800,fontSize:18 }}>출고 관리</div><div style={{ fontSize:12,color:"#6B7280" }}>출고준비 신청 기준</div></div>
        </div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
          <button style={{ ...BS,background:"#F0FDF4",color:"#059669",borderColor:"#BBF7D0" }} onClick={exportCSV}>📥 CSV {checkedShipIds.size > 0 ? `(선택 ${checkedShipIds.size}건)` : `(필터 ${groups.flatMap(([k,list])=>list).length}건)`}</button>
          {checkedShipIds.size > 0 && <button style={{ ...BS,background:"#FEF2F2",color:"#DC2626",borderColor:"#FECACA" }} onClick={()=>setCheckedShipIds(new Set())}>✕ 선택 해제</button>}

/* ════════════════════════════════════════════════════════
   직원 관리 컴포넌트
════════════════════════════════════════════════════════ */
function EmployeeManager({ employees, onReload }) {
  const [form, setForm] = useState({ name: "", dept: "", hire_date: "" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [xlsxPreview, setXlsxPreview] = useState(null);
  const [xlsxLoading, setXlsxLoading] = useState(false);
  const fileRef = useRef(null);

  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([
      ['이름','부서','입사일'],
      ['홍길동','영업본부','2024-01-15'],
      ['김철수','디자인','2023-06-20'],
    ]);
    ws['!cols'] = [{wch:12},{wch:16},{wch:14}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '직원목록');
    XLSX.writeFile(wb, '직원목록_양식.xlsx');
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type:'binary', cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header:1 });
        const headers = (raw[0]||[]).map(h => String(h).trim());
        const ni = headers.findIndex(h=>h==='이름');
        const di = headers.findIndex(h=>h==='부서');
        const hi = headers.findIndex(h=>h==='입사일');
        if (ni===-1||di===-1||hi===-1) { alert('열 이름이 올바르지 않습니다.\n필수 열: 이름, 부서, 입사일'); return; }
        const rows=[]; const errors=[];
        raw.slice(1).forEach((row,i)=>{
          if(!row||row.every(c=>!c)) return;
          const name=String(row[ni]||'').trim();
          const dept=String(row[di]||'').trim();
          let hd=row[hi];
          if(hd instanceof Date) hd=hd.toISOString().split('T')[0];
          else if(typeof hd==='number'){const d=XLSX.SSF.parse_date_code(hd);hd=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
          else hd=String(hd||'').trim();
          if(!name){errors.push(`${i+2}행: 이름 없음`);return;}
          if(!DEPT_LIST.includes(dept)){errors.push(`${i+2}행: "${dept}" 부서 없음 (${name})`);return;}
          if(!hd||!/^\d{4}-\d{2}-\d{2}$/.test(hd)){errors.push(`${i+2}행: 날짜 형식 오류 (${name})`);return;}
          rows.push({name,dept,hire_date:hd});
        });
        setXlsxPreview({rows,errors});
      } catch(err){ alert('파일 읽기 오류: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  };

  const handleBulkUpload = async () => {
    if(!xlsxPreview?.rows?.length) return;
    setXlsxLoading(true);
    try {
      await Promise.all(xlsxPreview.rows.map(r=>addEmployee(r)));
      alert(`${xlsxPreview.rows.length}명 업로드 완료!`);
      setXlsxPreview(null);
      onReload();
    } catch(e){ alert('업로드 중 오류가 발생했습니다.'); }
    finally{ setXlsxLoading(false); }
  };

  const handleAdd = async () => {
    if (!form.name.trim()) { setErr("이름을 입력해주세요"); return; }
    if (!form.dept) { setErr("부서를 선택해주세요"); return; }
    if (!form.hire_date) { setErr("입사일을 입력해주세요"); return; }
    setLoading(true);
    try {
      await addEmployee({ name: form.name.trim(), dept: form.dept, hire_date: form.hire_date });
      setForm({ name: "", dept: "", hire_date: "" });
      setErr("");
      onReload();
    } catch(e) { setErr("저장 중 오류가 발생했습니다."); }
    finally { setLoading(false); }
  };

  const handleDelete = async (id, name) => {
    if (!window.confirm(`"${name}" 직원을 삭제할까요?`)) return;
    try { await deleteEmployee(id); onReload(); }
    catch(e) { alert("삭제 중 오류가 발생했습니다."); }
  };

  const [empSearch, setEmpSearch] = useState('');
  const [editId,   setEditId]   = useState(null);
  const [editForm, setEditForm] = useState({});
  const startEdit = (emp) => { setEditId(emp.id); setEditForm({ name:emp.name, dept:emp.dept, hire_date:emp.hire_date }); };
  const cancelEdit = () => { setEditId(null); setEditForm({}); };
  const handleEditSave = async () => {
    if(!editForm.name.trim()){ alert('이름을 입력해주세요.'); return; }
    if(!editForm.dept){ alert('부서를 선택해주세요.'); return; }
    if(!editForm.hire_date){ alert('입사일을 입력해주세요.'); return; }
    try { await updateEmployee(editId, editForm.name.trim(), editForm.dept, editForm.hire_date); setEditId(null); onReload(); }
    catch { alert('수정 중 오류가 발생했습니다.'); }
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* 엑셀 업로드 */}
      <div style={{ background:"#F0FDF4", border:"1px solid #BBF7D0", borderRadius:10, padding:"16px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <div style={{ fontWeight:700, fontSize:14 }}>📎 엑셀/CSV 일괄 업로드</div>

            직원 목록 ({empSearch ? `${employees.filter(e=>e.name.includes(empSearch)||e.dept.includes(empSearch)).length}명 검색됨 / ` : ''}{employees.length}명)
          </div>
          <input
            style={{ ...INP, width:200, padding:'7px 11px', fontSize:13 }}
            placeholder="이름 또는 부서 검색"
            value={empSearch}
            onChange={e=>{ setEmpSearch(e.target.value); setEditId(null); }}
          />
        </div>
        {(() => {
          const filtered = empSearch ? employees.filter(e=>e.name.includes(empSearch)||e.dept.includes(empSearch)) : employees;
          return filtered.length === 0
          ? <div style={{ textAlign:"center", padding:32, color:"#9CA3AF" }}>{empSearch ? '검색 결과가 없습니다.' : '등록된 직원이 없습니다.'}</div>
          : <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"#F9FAFB" }}>
                  {["이름","부서","입사일","신청 가능일","PIN",""].map(h => <th key={h} style={TH}>{h}</th>)}

                </tr>
              </thead>
              <tbody>
                {filtered.map(emp => {
                  const hire = new Date(emp.hire_date);
                  const avail = new Date(hire); avail.setMonth(avail.getMonth() + 3);
                  const canApply = new Date() >= avail;
                  const isEdit = editId === emp.id;
                  return (
                    <tr key={emp.id} style={{ background: isEdit ? '#F0F9FF' : undefined }}>
                      <td style={{ ...TD, fontWeight:600 }}>
                        {isEdit
                          ? <input style={{ ...INP, padding:'5px 8px', fontSize:13, minWidth:80 }} value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} />
                          : emp.name}
                      </td>
                      <td style={TD}>
                        {isEdit
                          ? <select style={{ ...INP, padding:'5px 8px', fontSize:13, minWidth:100 }} value={editForm.dept} onChange={e=>setEditForm(f=>({...f,dept:e.target.value}))}>
                              <option value="" disabled>부서 선택</option>
                              {DEPT_LIST.map(d=><option key={d} value={d}>{d}</option>)}
                            </select>
                          : emp.dept}
                      </td>
                      <td style={{ ...TD, fontFamily:"monospace" }}>
                        {isEdit
                          ? <input type="date" style={{ ...INP, padding:'5px 8px', fontSize:13 }} value={editForm.hire_date} onChange={e=>setEditForm(f=>({...f,hire_date:e.target.value}))} />
                          : emp.hire_date}
                      </td>
                      <td style={TD}>
                        <span style={{ color: canApply ? "#059669" : "#DC2626", fontWeight:600 }}>
                          {canApply ? "✅ 가능" : `${avail.getFullYear()}.${avail.getMonth()+1}.${avail.getDate()} 부터`}
                        </span>
                      </td>
                      <td style={TD}>
                        {!isEdit && <button style={{ ...BT,color:'#1A56DB',borderColor:'#C7D7FB' }} onClick={async()=>{
                          const p=window.prompt(`"${emp.name}" PIN 설정 (현재: ${emp.pin??'0000'})\n숫자 4~6자리 입력:`);
                          if(p===null)return;
                          const clean = p.replace(/\D/g,'').slice(0,6);
                          if(!clean||clean.length<4){ alert('PIN은 숫자 4~6자리로 입력해주세요.'); return; }
                          try { await updateEmpPin(emp.id, clean); onReload(); alert('PIN이 변경되었습니다.'); }
                          catch{ alert('변경 중 오류가 발생했습니다.'); }
                        }}>PIN 설정</button>}
                      </td>
                      <td style={TD}>
                        {isEdit
                          ? <div style={{ display:'flex', gap:5 }}>
                              <button style={{ ...BT,color:'#059669',borderColor:'#BBF7D0',background:'#F0FDF4' }} onClick={handleEditSave}>저장</button>
                              <button style={{ ...BT }} onClick={cancelEdit}>취소</button>
                            </div>
                          : <div style={{ display:'flex', gap:5 }}>
                              <button style={{ ...BT,color:'#1A56DB',borderColor:'#C7D7FB' }} onClick={()=>startEdit(emp)}>수정</button>
                              <button style={{ ...BT, color:"#DC2626", borderColor:"#FECACA" }} onClick={() => handleDelete(emp.id, emp.name)}>삭제</button>
                            </div>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>;
        })()}
      </div>
    </div>
  );
}

function DatePickerInput({ value, onChange, style }) {
  const ref = useRef(null);
  const formatted = value
    ? (() => { const d = new Date(value + 'T00:00:00'); return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`; })()
    : "날짜 선택";
  return (
    <div style={{ position:"relative" }}>
      <div
        style={{ ...style, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", userSelect:"none" }}
        onClick={() => { try { ref.current.showPicker(); } catch { ref.current.click(); } }}
      >
        <span style={{ color: value ? "#111" : "#9CA3AF" }}>{formatted}</span>
        <span style={{ fontSize:16 }}>📅</span>
      </div>
      <input
        ref={ref}
        type="date"
        value={value}
        onChange={onChange}
        style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", opacity:0, cursor:"pointer", pointerEvents:"none" }}
      />
    </div>
  );
}
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    try {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
    } catch {
      // fallback
      const el = document.createElement("textarea"); el.value = text;
      document.body.appendChild(el); el.select(); document.execCommand("copy");
      document.body.removeChild(el);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    }
  };
  return (
    <button onClick={copy} style={{ padding:"3px 10px", border:`1.5px solid ${copied?"#059669":"#C7D7FB"}`, borderRadius:6, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", background:copied?"#F0FDF4":"#EEF3FF", color:copied?"#059669":"#1A56DB", transition:"all .2s" }}>
      {copied ? "✓ 복사됨" : "복사"}
    </button>
  );
}

function ShipPersonChip({ app, isBlue, typeFilter }) {
  const prods = [
    ...(typeFilter !== "샘플" ? (app.mainProducts||[]).map(p=>({...p,type:"본품"})) : []),
    ...(typeFilter !== "본품" ? (app.sampleProducts||[]).map(p=>({...p,type:"샘플"})) : []),
  ];
  const prodStr = prods.map(p => `${p.name} ${p.qty}개`).join(" · ");
  return (
    <div style={{ display:"flex",alignItems:"flex-start",gap:8,background:app.shipStatus==="출고완료"?"#F0FDF4":isBlue?"#EEF3FF":"#ECFDF5",border:`1px solid ${app.shipStatus==="출고완료"?"#BBF7D0":isBlue?"#C7D7FB":"#A7F3D0"}`,borderRadius:8,padding:"8px 12px",minWidth:0,flex:"0 0 auto",maxWidth:"100%" }}>

      <div style={{ minWidth:0 }}>
        <div style={{ fontWeight:700,fontSize:13 }}>{app.name} <span style={{ fontSize:11,color:"#9CA3AF",fontWeight:400 }}>{app.dept}</span></div>
        {prodStr && <div style={{ fontSize:11,color:"#374151",marginTop:2,lineHeight:1.5 }}>{prodStr}</div>}
      </div>
    </div>
  );
}

  const [empAuth,    setEmpAuth]    = useState(null);
  const [empLoading, setEmpLoading] = useState(true);
  const [notice,     setNotice]     = useState({ title: "제품 신청 안내", body: "본품: 매달 첫째주 화요일 마감 / 샘플: 매달 10일 전 영업일 마감", deadline: "" });

  useEffect(() => {
    const el = document.createElement("style"); el.textContent = GLOBAL_CSS; document.head.appendChild(el);
    return () => document.head.removeChild(el);
  }, []);

  // 저장된 세션 복원
  useEffect(() => {
    const restore = async () => {
      const raw = localStorage.getItem('emp_session');
      if(!raw){ setEmpLoading(false); return; }
      try {
        const s = JSON.parse(raw);
        const valid = await validateEmpSession(s.token);
        if(valid){ setEmpAuth({ id:s.empId, name:s.empName, dept:s.empDept, token:s.token }); }
        else { localStorage.removeItem('emp_session'); }
      } catch{ localStorage.removeItem('emp_session'); }
      setEmpLoading(false);
    };
    restore();
  }, []);

  // 세션 주기적 검증 (60초) - 다른 기기 로그인 시 강제 로그아웃
  useEffect(() => {
    if(!empAuth) return;
    const timer = setInterval(async () => {
      const valid = await validateEmpSession(empAuth.token);
      if(!valid){
        localStorage.removeItem('emp_session');
        setEmpAuth(null);
        alert('다른 기기에서 로그인되어 자동 로그아웃됩니다.');
      }
    }, 60000);
    return () => clearInterval(timer);
  }, [empAuth]);

  useEffect(() => { loadNotice().then(n => { if (n) setNotice(n); }); }, []);
  useEffect(() => {
    if (page === "employee") { loadNotice().then(n => { if (n) setNotice(n); }); }
  }, [page]);

  const logout = () => { localStorage.removeItem("admin_auto"); localStorage.removeItem("admin_pw"); setAuth(false); setPage("admin"); };
  const empLogout = async () => {
    if(empAuth){
      const ip = await getMyIP().catch(()=>'unknown');
      await logAccess(empAuth.name, empAuth.dept, '로그아웃', ip);
      await removeEmpSession(empAuth.token).catch(()=>{});
    }
    localStorage.removeItem('emp_session');
    setEmpAuth(null);
  };

  if(empLoading) return <div style={{ display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontFamily:FF,color:'#9CA3AF',fontSize:15 }}>로딩 중...</div>;

  if (page === "ship") return <ShipPage onBack={() => setPage("admin")} />;
  if (page === "admin") {
    if (!auth) return <AdminLogin onLogin={() => setAuth(true)} />;
    return <AdminDash onBack={() => setPage("employee")} onGoShip={() => setPage("ship")} onLogout={logout} />;
  }
  if(!empAuth) return <EmployeeLogin onLogin={setEmpAuth} onAdminBypass={auth ? () => setPage("admin") : null} onGoAdmin={() => setPage("admin")} />;
  const effectiveAuth = empAuth || (auth ? { id:0, name:"관리자", dept:"", token:"admin" } : null);
  return <EmployeePage notice={notice} onAdmin={() => setPage("admin")} empAuth={effectiveAuth} onEmpLogout={empLogout} />;
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
